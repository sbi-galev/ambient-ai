name: Deploy static archive to Pages

# The static site is built locally (it needs the saved transcripts and the local
# LLM) and committed under site/. This workflow only publishes that committed
# output to GitHub Pages — it does not rebuild. Deploys use the workflow's
# built-in GITHUB_TOKEN, so no personal credentials are required.

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
